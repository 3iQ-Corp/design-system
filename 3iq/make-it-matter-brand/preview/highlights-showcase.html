<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:linear-gradient(180deg,#080E23,#4C3D32); color:#FDFEFA">
  <div class="label" style="color:#D6D5BF; opacity:0.8">Hand-drawn highlights — 12 styles × 11 colors</div>
  <div style="display:grid; gap:16px; margin-top:4px">
    <div style="font-family:'Denton',serif; font-weight:300; font-size:36px; line-height:1.1em; letter-spacing:0.01em">
      What you do here <span style="position:relative; display:inline-block">matters.<span style="position:absolute; bottom:-4px; left:0; right:0; height:8px; background:#EDC577; opacity:0.6; border-radius:2px; transform:rotate(-1deg)"></span></span>
    </div>
    <div style="font-family:'Denton',serif; font-weight:300; font-size:36px; line-height:1.1em; letter-spacing:0.01em">
      How you work <span style="position:relative; display:inline-block">matters.<span style="position:absolute; bottom:-4px; left:0; right:0; height:8px; background:#E6704E; opacity:0.6; border-radius:2px; transform:rotate(0.5deg)"></span></span>
    </div>
    <div style="font-family:'Denton',serif; font-weight:300; font-size:36px; line-height:1.1em; letter-spacing:0.01em">
      How you treat others <span style="position:relative; display:inline-block">matters.<span style="position:absolute; bottom:-4px; left:0; right:0; height:8px; background:#4C9478; opacity:0.6; border-radius:2px; transform:rotate(-0.5deg)"></span></span>
    </div>
  </div>
  <div class="value" style="font-size:11px; color:#D6D5BF">Use highlight PNGs from assets/highlights/ · vary style for natural feel · emphasize "matters"</div>
</div></body></html>
