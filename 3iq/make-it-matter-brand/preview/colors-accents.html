<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row">
    <div class="col" style="flex:1">
      <div class="swatch" style="background:#EAE7E2"></div>
      <div class="label">Neutral</div>
      <div class="value">#EAE7E2</div>
    </div>
    <div class="col" style="flex:1">
      <div class="swatch" style="background:#D6D5BF"></div>
      <div class="label">Gold</div>
      <div class="value">#D6D5BF</div>
    </div>
    <div class="col" style="flex:1">
      <div class="swatch" style="background:#B8C6C4"></div>
      <div class="label">Platinum</div>
      <div class="value">#B8C6C4</div>
    </div>
  </div>
  <div class="row" style="margin-top:4px">
    <div class="col" style="flex:1">
      <div class="swatch" style="background:#EDC577"></div>
      <div class="label">Yellow</div>
      <div class="value">#EDC577</div>
    </div>
    <div class="col" style="flex:1">
      <div class="swatch" style="background:#4C9478"></div>
      <div class="label">Green</div>
      <div class="value">#4C9478</div>
    </div>
    <div class="col" style="flex:1">
      <div class="swatch" style="background:#E6704E"></div>
      <div class="label">Orange</div>
      <div class="value">#E6704E</div>
    </div>
  </div>
</div></body></html>
