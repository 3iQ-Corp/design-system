<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>

      <div class="swatch" style="background:linear-gradient(180deg, #1E3239, #02393C); height:110px"></div>

      <div class="value" style="font-family:ui-monospace,Menlo,monospace; font-size:11px">#1E3239 → #02393C</div>
    </div>
    <div class="col" style="flex:1">
      <div class="swatch" style="background:linear-gradient(180deg, #1C0E1D, #3A172A); height:110px"></div>
      <div class="label">Warmth — orange</div>
      <div class="value" style="font-family:ui-monospace,Menlo,monospace; font-size:11px">#1C0E1D → #3A172A</div>
