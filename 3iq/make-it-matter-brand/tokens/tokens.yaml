# 3iQ #MakeItMatter Design Tokens
# Employer brand campaign design system for the #MakeItMatter initiative.
# Sourced from 3iQ-MakeItMatter-Guidelines-v2.pdf (February 2026).
# Machine-readable companions: tokens/tokens.json and tokens/tokens.css.
# Keep all three in sync.

brand:
  name: "3iQ Corp — #MakeItMatter"
  short: "#MakeItMatter"
  tagline: "#MakeItMatter — what you do here matters."
  positioning: >
    #MakeItMatter is 3iQ's employer brand campaign — a unifying theme
    for talent attraction, cultural consistency, and internal engagement.
    It complements the corporate brand; it does not replace it.
  founded: 2012
  hq: "161 Bay Street, Suite 2700, Toronto, Ontario, Canada M5J 2S1"
  parent: "Monex Group (Coincheck Group as of 2026)"
  campaign_version: "v2.0 — February 2026"

# ─────────────────────────────────────────────────────────────────────────────
# COLOR — sourced from 3iQ-MakeItMatter-Guidelines-v2.pdf
# ─────────────────────────────────────────────────────────────────────────────
color:
  # Primitive palette — atomic colors from the MIM guidelines
  swatch:
    # Core colors
    dark:            "#080E23"   # Navy — primary dark / ink
    dark_secondary:  "#4C3D32"   # warm brown (used in Forge gradient)
    light:           "#FDFEFA"   # Off White — primary paper (MIM spec)
    light_secondary: "#F4ECE5"   # warm cream
    light_tertiary:  "#F8F7F5"   # cool paper
    neutral:         "#EAE7E2"   # MIM Neutral accent
    transparent:     "#FFFFFF00"

    # MIM accent palette
    brand:    "#D6D5BF"          # Gold — primary brand accent
    brand_2:  "#B8C6C4"          # Platinum
    brand_3:  "#EAE7E2"          # Neutral
    brand_4:  "#EDC577"          # Yellow

    # Accent / highlight
    green:    "#4C9478"          # positive, accent highlight
    yellow:   "#EDC577"          # eyebrow, accent bar, highlight (MIM spec)
    orange:   "#E6704E"          # warmth accent

    # People & Culture additions (restricted use)
    fuchsia:  "#ED5377"          # P&C only
    mauve:    "#9269AE"          # P&C only
    blue:     "#2EA1AE"          # P&C only

    # Status
    alert_negative: "#DA3B3B"
    alert_positive: "#4C9478"    # alias of green

  # Semantic roles — USE THESE in templates, not the swatches above.
  role:
    # Dark theme (default for hero / social / slides)
    dark:
      bg:           "#080E23"
      surface:      "#4C3D32"
      text:         "#FDFEFA"
      text_muted:   "#D6D5BF"
      border:       "#FDFEFA"
      border_muted: "rgb(253 254 250 / 0.25)"
      cta_bg:       "transparent"
      cta_text:     "#080E23"
      accent:       "#EDC577"
      rule:         "#EDC577"
      rule_muted:   "rgb(253 254 250 / 0.25)"

    # Light theme (for docs, long-form, paper outputs)
    light:
      bg:           "#FDFEFA"
      surface:      "#F8F7F5"
      text:         "#080E23"
      text_muted:   "#4C3D32"
      border:       "#080E23"
      border_muted: "rgb(8 14 35 / 0.25)"
      cta_bg:       "#D6D5BF"
      cta_text:     "#080E23"
      accent:       "#EDC577"
      rule:         "#080E23"
      rule_muted:   "rgb(8 14 35 / 0.25)"

  # Gradient-theme overlays — MIM defines six gradients, three dark hero
  # gradients (Forge, Growth, Warmth) and three light card/section gradients
  # (Sky, Golden, Platinum).
  gradient_theme:
    forge:
      label: "Forge — corporate / default"
      gradient_top:    "#080E23"
      gradient_bottom: "#4C3D32"
      accent:          "#EDC577"
    growth:
      label: "Growth — green / teal"
      gradient_top:    "#1E3239"
      gradient_bottom: "#02393C"
      accent:          "#4C9478"
    warmth:
      label: "Warmth — warm / orange"
      gradient_top:    "#1C0E1D"
      gradient_bottom: "#3A172A"
      accent:          "#E6704E"

# ─────────────────────────────────────────────────────────────────────────────
# TYPOGRAPHY — inherits from corporate 3iQ design system
# ─────────────────────────────────────────────────────────────────────────────
typography:
  # Primary family — body, UI, small headlines (H6), buttons
  primary:
    family: "Neue Haas Grotesk Display, Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    fallback_web:  "Inter, -apple-system, Segoe UI, sans-serif"
    fallback_email: "Arial, Helvetica, sans-serif"
    weights:
      light: 300
      regular: 400
      medium: 500
      semibold: 600

  # Secondary family — display and H1-H5 headlines
  secondary:
    family: "Denton, Palatino Linotype, Georgia, serif"
    fallback_web:  "Palatino Linotype, Georgia, serif"
    fallback_email: "Georgia, Times New Roman, serif"
    weights:
      light: 300

  # Scale in rem (1rem = 16px)
  scale:
    display:    "7rem"
    h1:         "5rem"
    h2:         "4rem"
    h3:         "3rem"
    h4:         "2.5rem"
    h5:         "2rem"
    h6:         "1.5rem"
    text_large: "1.25rem"
    text_main:  "1rem"
    text_small: "0.875rem"

  role_to_family:
    display: secondary
    h1: secondary
    h2: secondary
    h3: secondary
    h4: secondary
    h5: secondary
    h6: primary
    text_large: primary
    text_main:  primary
    text_small: primary

  line_height:
    tight:   "1em"
    snug:    "1.1em"
    normal:  "1.25em"
    relaxed: "1.5em"

  letter_spacing:
    normal:  "0em"
    heading: "0.01em"
    wide:    "0.04em"

  weight_defaults:
    heading: 300
    body:    500
    ui:      500
    strong:  600

# ─────────────────────────────────────────────────────────────────────────────
# SIZE / SPACING — same as corporate design system
# ─────────────────────────────────────────────────────────────────────────────
size:
  "0":     "0rem"
  "0-125": "0.125rem"
  "0-25":  "0.25rem"
  "0-5":   "0.5rem"
  "0-75":  "0.75rem"
  "1":     "1rem"
  "1-25":  "1.25rem"
  "1-5":   "1.5rem"
  "2":     "2rem"
  "2-5":   "2.5rem"
  "3":     "3rem"
  "3-5":   "3.5rem"
  "4":     "4rem"
  "5":     "5rem"
  "6":     "6rem"
  "7":     "7rem"
  "8":     "8rem"
  "10":    "10rem"
  "12":    "12rem"
  "15":    "15rem"

padding:
  vertical:
    none:    "0rem"
    x_small: "2.5rem"
    small:   "5rem"
    main:    "7rem"
    large:   "10rem"
    x_large: "15rem"
  horizontal:
    small: "2.5rem"
    main:  "5rem"

# ─────────────────────────────────────────────────────────────────────────────
# RADIUS & BORDER
# ─────────────────────────────────────────────────────────────────────────────
radius:
  x_small: "0.25rem"
  small:   "0.375rem"
  main:    "1rem"
  round:   "100vw"

border_width:
  main:  "1px"
  large: "2px"

# ─────────────────────────────────────────────────────────────────────────────
# GRADIENTS — six MIM gradients per the guidelines
# ─────────────────────────────────────────────────────────────────────────────
gradient:
  # Dark hero gradients
  forge:   "linear-gradient(180deg, #080E23, #4C3D32)"
  growth:  "linear-gradient(180deg, #1E3239, #02393C)"
  warmth:  "linear-gradient(180deg, #1C0E1D, #3A172A)"

  # Light section/card gradients
  sky:      "linear-gradient(180deg, #C9D7D7, #F4ECE5)"
  golden:   "linear-gradient(180deg, #D6D5BF, #F8F7F5)"
  platinum: "linear-gradient(180deg, #B8C6C4, #F8F7F5)"

  # Button on dark theme
  button_dark: "linear-gradient(to right, #FDFEFA 15%, #D6D5BF 100%)"

  # Utility fade
  dark_fade_right: "linear-gradient(90deg, #080E23, #080E231A 65%)"

# ─────────────────────────────────────────────────────────────────────────────
# LOGO
# ─────────────────────────────────────────────────────────────────────────────
logo:
  mim_primary_navy: "assets/logos/3iQ-MakeItMatter-Logo-Navy.svg"
  mim_primary_white: "assets/logos/3iQ-MakeItMatter-Logo-White.svg"
  corporate: "assets/logos/3iq_logo.svg"
  clearspace: "Minimum clearspace around the MIM logo equals the height of the hashtag (#) symbol."
  min_width_px: 120
  color_rule: "One colour only — Navy (#080E23) on light surfaces, White (#FDFEFA) on dark surfaces."
  favicon: "assets/3iq_favicon.png"
  webclip: "assets/3iq_webclip.png"

# ─────────────────────────────────────────────────────────────────────────────
# HIGHLIGHTS — hand-drawn underline/emphasis assets
# ─────────────────────────────────────────────────────────────────────────────
highlights:
  description: >
    12 hand-drawn highlight/underline shapes, each available in 11 colour
    variants (Blue, Gold, Green, Mauve, Navy, Neutral, Orange, Platinum,
    Red, White, Yellow). Use them to emphasize the word "matters" in copy.
    Vary the highlight style within a document for a natural look.
  count: 12
  color_variants:
    - Blue
    - Gold
    - Green
    - Mauve
    - Navy
    - Neutral
    - Orange
    - Platinum
    - Red
    - White
    - Yellow
  path_pattern: "assets/highlights/3iQ-Highlight-{n}-{Color}.png"
  usage: "Best used under/around the word 'matters' in campaign copy."
  original_artwork_mandate: >
    ALWAYS use the original PNG files. Never approximate, simulate, or
    redraw highlights using CSS, SVG, gradients, or any other method.
    The hand-drawn artwork must be reproduced exactly as the artists
    created it — no variation from the originals.
  placement_rule: >
    The PNG highlight files must never be used to cross words out. Position
    them beneath/behind text only. The actual PNG files can slightly overlap
    the bottom of letterforms but must never fully cover, strike through, or
    obscure the word. Text must always render on top and remain fully legible.

# ─────────────────────────────────────────────────────────────────────────────
# VOICE — employer brand tone
# ─────────────────────────────────────────────────────────────────────────────
voice:
  tone: >
    Warm, purposeful, human. Speaks to what drives people at 3iQ — purpose,
    collaboration, growth, and impact. More personal than the corporate brand
    voice, but still grounded and authentic. Never performative or hollow.
  signature_phrases:
    - "#MakeItMatter — what you do here matters."
    - "If you're driven by purpose, you're already one of us."
    - "Celebrate those who raise others higher."
    - "It's not just what we build, it's how we build it together."
    - "We before me, always."
    - "We don't wait for the future, we build it."
  narrative_lines:
    - "That what you do here matters."
    - "How you work matters."
    - "How you treat others matters."
    - "And the difference we make together, really matters."
  do:
    - "Lead with purpose and values — what makes 3iQ's culture distinct."
    - "Use the #MakeItMatter hashtag consistently in employer brand content."
    - "Pair the MIM logo with approved messaging and highlights."
    - "Vary highlight styles within a document for a natural, hand-drawn feel."
    - "Use the word 'matters' as the anchor for emphasis highlights."
    - "Complement the corporate brand — never replace it."
    - "Ask the user design questions before producing visual artifacts (light/dark background, format, dimensions, messaging, highlight preferences)."
    - "Always use the original artist-created highlight PNGs — never simulate or approximate them."
  dont:
    - "Emojis in employer brand content."
    - "Remove the underline from the #MakeItMatter logo."
    - "Remove the hashtag from #MakeItMatter."
    - "Add word spaces — it is #MakeItMatter, not #Make It Matter."
    - "Use highlight colours on the logo — logo is Navy or White only."
    - "Distort, rotate, or stretch the logo."
    - "Use this as a replacement for the 3iQ corporate brand."
    - "Simulate hand-drawn highlights with CSS, SVG, or any non-PNG method."
    - "Position the PNG highlight files over text so they cross out, strike through, or fully overlay words — they can slightly overlap but must never obscure."

# ─────────────────────────────────────────────────────────────────────────────
# VALUES — the six 3iQ values that ground the MIM campaign
# ─────────────────────────────────────────────────────────────────────────────
values:
  - name: "Lead with Kyodo"
    expression: "We before me. Collaboration makes it matter."
  - name: "Stay Humble"
    expression: "Curiosity, learning, and listening make our work matter."
  - name: "Elevate Others"
    expression: "Recognition and empowerment show others matter."
  - name: "Innovate & Adapt"
    expression: "Our ability to lead makes us matter."
  - name: "Offer Radical Candour"
    expression: "Honest feedback makes growth matter."
  - name: "Follow Through"
    expression: "Delivering on promises proves it matters."

